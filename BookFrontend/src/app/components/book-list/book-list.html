<div class="container-fluid px-4 mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
    <h2 class="fw-bold text-dark">Book Management</h2>
    <button class="btn btn-primary shadow-sm" type="button" (click)="toggleForm()">
      <i class="bi" [ngClass]="isFormVisible ? 'bi-dash-lg' : 'bi-plus-lg'"></i>
      {{ isFormVisible ? ' Close Form' : ' Add New Book' }}
    </button>
  </div>

  <div class="mb-5" *ngIf="isFormVisible">
    <div class="bg-light p-4 rounded border shadow-sm">
      <h5 class="mb-3 text-secondary">{{ newBook.id === 0 ? 'Enter New Book Details' : 'Update Book Details' }}</h5>
      <form (ngSubmit)="saveBook()" class="row g-3">
        <div class="col-md-3">
          <label class="form-label small fw-bold">Title</label>
          <input type="text" class="form-control" [(ngModel)]="newBook.title" name="title" required>
        </div>
        <div class="col-md-3">
          <label class="form-label small fw-bold">Author</label>
          <input type="text" class="form-control" [(ngModel)]="newBook.author" name="author" required>
        </div>
        <div class="col-md-3">
          <label class="form-label small fw-bold">ISBN Number</label>
          <input type="text" class="form-control" [(ngModel)]="newBook.isbn" name="isbn" required>
        </div>
        <div class="col-md-3">
          <label class="form-label small fw-bold">Published Date</label>
          <input type="date" class="form-control" [(ngModel)]="newBook.publicationDate" name="pubDate">
        </div>
        <div class="col-12 text-end mt-4">
          <button type="button" class="btn btn-link text-decoration-none text-muted me-3" (click)="toggleForm()">Cancel</button>
          <button type="submit" class="btn btn-dark px-4 shadow-sm">
            {{ newBook.id === 0 ? 'Add Book' : 'Update Changes' }}
          </button>
        </div>
      </form>
    </div>
  </div>

  <div class="table-responsive">
    <table class="table table-borderless table-striped align-middle">
      <thead class="bg-white border-bottom">
        <tr>
          <th class="py-3 text-secondary text-uppercase small">Title</th>
          <th class="py-3 text-secondary text-uppercase small">Author</th>
          <th class="py-3 text-secondary text-uppercase small">ISBN</th>
          <th class="py-3 text-secondary text-uppercase small">Publication Date</th>
          <th class="py-3 text-secondary text-uppercase small text-end">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let book of books">
          <td class="py-3"><strong>{{ book.title }}</strong></td>
          <td class="text-muted">{{ book.author }}</td>
          <td>{{ book.isbn }}</td>
          <td class="text-muted">{{ book.publicationDate | date:'mediumDate' }}</td>
          <td class="text-end">
            <button class="btn btn-light btn-sm me-2" (click)="editBook(book)">
              <i class="bi bi-pencil-fill text-primary"></i>
            </button>
            <button class="btn btn-light btn-sm" (click)="deleteBook(book.id)">
              <i class="bi bi-trash3-fill text-danger"></i>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
